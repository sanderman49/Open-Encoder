name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            bundles: deb
            artifact: app-linux-deb
          - os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            bundles: appimage
            artifact: app-linux-appimage
          - os: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            bundles: rpm
            artifact: app-linux-rpm
          - os: macos-14
            triple: aarch64-apple-darwin
            artifact: app-macos
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            artifact: app-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Download FFmpeg binaries
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p src-tauri/binaries
          gh release download ffmpeg-bins \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "ffmpeg-${{ matrix.triple }}*" \
            --pattern "ffprobe-${{ matrix.triple }}*" \
            --dir src-tauri/binaries/
          chmod +x src-tauri/binaries/* 2>/dev/null || true
          test -f src-tauri/binaries/ffmpeg-${{ matrix.triple }} || { echo "ERROR: ffmpeg-${{ matrix.triple }} not in ffmpeg-bins release"; exit 1; }
          test -f src-tauri/binaries/ffprobe-${{ matrix.triple }} || { echo "ERROR: ffprobe-${{ matrix.triple }} not in ffmpeg-bins release"; exit 1; }

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node dependencies
        run: npm ci

      - name: Build app
        shell: bash
        run: |
          if [ -n "$BUNDLES" ]; then
            npm run tauri:build -- --bundles "$BUNDLES"
          else
            npm run tauri:build
          fi
        env:
          BUNDLES: ${{ matrix.bundles }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          retention-days: 30
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
