name: FFmpeg – macOS (Intel + Apple Silicon)

on:
  push:
    paths:
      - .github/workflows/ffmpeg-macos.yml

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            triple: x86_64-apple-darwin
          - runner: macos-14
            triple: aarch64-apple-darwin

    runs-on: ${{ matrix.runner }}

    env:
      DEPS: ${{ github.workspace }}/deps

    steps:
      - name: Install build tools
        run: brew install nasm autoconf automake libtool

      - name: Set PKG_CONFIG_PATH
        run: echo "PKG_CONFIG_PATH=$DEPS/lib/pkgconfig:$DEPS/lib64/pkgconfig" >> $GITHUB_ENV

      - name: Clone all sources
        run: |
          git clone --depth=1 https://github.com/xiph/ogg.git
          git clone --depth=1 https://github.com/xiph/vorbis.git
          git clone --depth=1 https://github.com/xiph/opus.git
          git clone --depth=1 https://github.com/lameproject/lame.git
          git clone --depth=1 https://code.videolan.org/videolan/x264.git
          git clone --depth=1 https://bitbucket.org/multicoreware/x265_git.git
          git clone --depth=1 https://chromium.googlesource.com/webm/libvpx.git
          git clone --depth=1 https://gitlab.com/AOMediaCodec/SVT-AV1.git
          git clone --depth=1 https://git.ffmpeg.org/ffmpeg.git

      - name: Build libogg
        working-directory: ogg
        run: |
          autoreconf -fiv
          ./configure --prefix="$DEPS" --enable-static --disable-shared
          make -j$(sysctl -n hw.logicalcpu) install

      - name: Build libvorbis
        working-directory: vorbis
        run: |
          autoreconf -fiv
          sed -i '' 's/-force_cpusubtype_ALL//g' configure
          ./configure --prefix="$DEPS" --enable-static --disable-shared \
            --with-ogg="$DEPS"
          make -j$(sysctl -n hw.logicalcpu) install

      - name: Build libopus
        working-directory: opus
        run: |
          autoreconf -fiv
          ./configure --prefix="$DEPS" --enable-static --disable-shared --disable-doc
          make -j$(sysctl -n hw.logicalcpu) install

      - name: Build libmp3lame
        working-directory: lame
        run: |
          autoreconf -fiv || true
          ./configure --prefix="$DEPS" --enable-static --disable-shared \
            --disable-frontend
          make -j$(sysctl -n hw.logicalcpu) install

      - name: Build libx264
        working-directory: x264
        run: |
          ./configure --prefix="$DEPS" --enable-static --disable-shared \
            --disable-opencl --enable-pic
          make -j$(sysctl -n hw.logicalcpu) install

      - name: Build libx265
        run: |
          cmake -S x265_git/source -B x265_build \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_SHARED=OFF \
            -DCMAKE_INSTALL_PREFIX="$DEPS" \
            -DCMAKE_INSTALL_LIBDIR=lib
          cmake --build x265_build -j$(sysctl -n hw.logicalcpu)
          cmake --install x265_build
          # cmake --install may not install the .pc file on all cmake versions;
          # copy directly from the build dir where configure_file() always writes it.
          mkdir -p "$DEPS/lib/pkgconfig"
          cp x265_build/x265.pc "$DEPS/lib/pkgconfig/x265.pc" 2>/dev/null || true
          # If .pc still missing, write a minimal one so FFmpeg configure can find it
          if [ ! -f "$DEPS/lib/pkgconfig/x265.pc" ]; then
            X265_VER=$(grep -r "X265_BUILD" x265_git/source/CMakeLists.txt | grep -o '[0-9]\+' | head -1)
            cat > "$DEPS/lib/pkgconfig/x265.pc" <<PCEOF
prefix=$DEPS
exec_prefix=\${prefix}
libdir=\${prefix}/lib
includedir=\${prefix}/include
Name: x265
Description: H.265/HEVC video encoder
Version: ${X265_VER:-210}
Libs: -L\${libdir} -lx265
Libs.private: -lc++ -lpthread -lm
Cflags: -I\${includedir}
PCEOF
          fi

      - name: Build libvpx
        working-directory: libvpx
        run: |
          ./configure --prefix="$DEPS" --enable-static --disable-shared \
            --disable-examples --disable-unit-tests --disable-tools
          make -j$(sysctl -n hw.logicalcpu) install

      - name: Build SVT-AV1
        run: |
          cmake -S SVT-AV1 -B SVT-AV1/Build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_INSTALL_PREFIX="$DEPS" \
            -DCMAKE_INSTALL_LIBDIR=lib
          cmake --build SVT-AV1/Build -j$(sysctl -n hw.logicalcpu)
          cmake --install SVT-AV1/Build

      - name: Configure FFmpeg
        working-directory: ffmpeg
        run: |
          PKG_CONFIG_PATH="$DEPS/lib/pkgconfig:$DEPS/lib64/pkgconfig" \
          ./configure \
            --prefix="${{ github.workspace }}/ffmpeg_out" \
            --enable-gpl \
            --enable-libx264 \
            --enable-libx265 \
            --enable-libvpx \
            --enable-libsvtav1 \
            --enable-libmp3lame \
            --enable-libvorbis \
            --enable-libopus \
            --enable-videotoolbox \
            --enable-audiotoolbox \
            --enable-coreimage \
            --extra-cflags="-I$DEPS/include" \
            --extra-ldflags="-L$DEPS/lib" \
            --pkg-config-flags="--static" \
            --disable-shared \
            --enable-static \
            --disable-doc \
            --disable-htmlpages \
            --disable-manpages \
            --disable-podpages \
            --disable-txtpages

      - name: Build FFmpeg
        working-directory: ffmpeg
        run: make -j$(sysctl -n hw.logicalcpu)

      - name: Install FFmpeg
        working-directory: ffmpeg
        run: make install

      - name: Package and verify
        run: |
          mkdir -p binaries
          cp "${{ github.workspace }}/ffmpeg_out/bin/ffmpeg"  binaries/ffmpeg-${{ matrix.triple }}
          cp "${{ github.workspace }}/ffmpeg_out/bin/ffprobe" binaries/ffprobe-${{ matrix.triple }}
          chmod +x binaries/ffmpeg-${{ matrix.triple }} binaries/ffprobe-${{ matrix.triple }}

          echo "=== Version ==="
          binaries/ffmpeg-${{ matrix.triple }} -version

          echo "=== Dynamic deps ==="
          otool -L binaries/ffmpeg-${{ matrix.triple }}
          otool -L binaries/ffprobe-${{ matrix.triple }}

      - name: Check no Homebrew dylib leakage
        run: |
          bad=$(otool -L binaries/ffmpeg-${{ matrix.triple }} binaries/ffprobe-${{ matrix.triple }} \
                | grep -E '/opt/homebrew|/usr/local/lib' || true)
          if [ -n "$bad" ]; then
            echo "::error::Homebrew dylib dependencies found — static linking incomplete:"
            echo "$bad"
            exit 1
          fi
          echo "Clean — no Homebrew paths in dynamic deps."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ matrix.triple }}
          path: binaries/
          retention-days: 90

      - name: Publish to ffmpeg-bins release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ffmpeg-bins \
            --repo "$GITHUB_REPOSITORY" \
            --title "FFmpeg Binaries" \
            --notes "Pre-built static FFmpeg binaries. Updated automatically." \
            --prerelease 2>/dev/null || true
          gh release upload ffmpeg-bins binaries/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
