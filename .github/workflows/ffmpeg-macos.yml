name: FFmpeg – macOS (Intel + Apple Silicon)

on:
  push:
    paths:
      - .github/workflows/ffmpeg-macos.yml

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13   # Intel x86_64
            triple: x86_64-apple-darwin
          - runner: macos-14   # Apple Silicon arm64
            triple: aarch64-apple-darwin

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Install build dependencies
        run: |
          brew install nasm pkg-config \
            x264 x265 libvpx \
            lame libvorbis opus

      - name: Clone FFmpeg + SVT-AV1 sources
        # All git operations before the dylib purge — Homebrew git links against libpcre2.
        run: |
          git clone --depth=1 https://git.ffmpeg.org/ffmpeg.git
          git clone --depth=1 https://gitlab.com/AOMediaCodec/SVT-AV1.git

      - name: Build SVT-AV1 from source (static)
        # Homebrew's svt-av1 is dylib-only; build a static .a ourselves.
        run: |
          cmake -S SVT-AV1 -B SVT-AV1/Build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/svtav1_out"
          cmake --build SVT-AV1/Build -j$(sysctl -n hw.logicalcpu)
          cmake --install SVT-AV1/Build

      - name: Remove codec dylibs to force static linking
        # Target only the codec libraries — tools like git and pkg-config need their own dylibs.
        # Search the entire prefix (including opt/) to catch versioned files outside /lib.
        run: |
          prefix=$(brew --prefix)
          find "$prefix" \( \
            -name "libx264*.dylib" \
            -o -name "libx265*.dylib" \
            -o -name "libvpx*.dylib" \
            -o -name "libSvtAv1Enc*.dylib" \
            -o -name "libmp3lame*.dylib" \
            -o -name "libvorbis*.dylib" \
            -o -name "libvorbisenc*.dylib" \
            -o -name "libvorbisfile*.dylib" \
            -o -name "libogg*.dylib" \
            -o -name "libopus*.dylib" \
          \) -delete || true

      - name: Configure
        working-directory: ffmpeg
        run: |
          prefix=$(brew --prefix)
          ./configure \
            --prefix="$GITHUB_WORKSPACE/ffmpeg_out" \
            --enable-gpl \
            --enable-libx264 \
            --enable-libx265 \
            --enable-libvpx \
            --enable-libsvtav1 \
            --enable-libmp3lame \
            --enable-libvorbis \
            --enable-libopus \
            --enable-videotoolbox \
            --enable-audiotoolbox \
            --enable-coreimage \
            --extra-cflags="-I$prefix/include -I$GITHUB_WORKSPACE/svtav1_out/include" \
            --extra-ldflags="-L$prefix/lib -L$GITHUB_WORKSPACE/svtav1_out/lib" \
            --pkg-config-flags="--static" \
            --disable-shared \
            --enable-static \
            --disable-doc \
            --disable-htmlpages \
            --disable-manpages \
            --disable-podpages \
            --disable-txtpages

      - name: Build
        working-directory: ffmpeg
        run: make -j$(sysctl -n hw.logicalcpu)

      - name: Install
        working-directory: ffmpeg
        run: make install

      - name: Package and verify
        run: |
          mkdir -p binaries
          cp ffmpeg_out/bin/ffmpeg  binaries/ffmpeg-${{ matrix.triple }}
          cp ffmpeg_out/bin/ffprobe binaries/ffprobe-${{ matrix.triple }}
          chmod +x binaries/ffmpeg-${{ matrix.triple }}
          chmod +x binaries/ffprobe-${{ matrix.triple }}

          echo "=== Version ==="
          ./binaries/ffmpeg-${{ matrix.triple }} -version

          echo "=== Dynamic deps ==="
          otool -L binaries/ffmpeg-${{ matrix.triple }}
          otool -L binaries/ffprobe-${{ matrix.triple }}

      - name: Check no Homebrew dylib leakage
        run: |
          bad=$(otool -L binaries/ffmpeg-${{ matrix.triple }} binaries/ffprobe-${{ matrix.triple }} \
                | grep -E '/opt/homebrew|/usr/local/lib' || true)
          if [ -n "$bad" ]; then
            echo "::error::Homebrew dylib dependencies found — static linking incomplete:"
            echo "$bad"
            exit 1
          fi
          echo "Clean — no Homebrew paths in dynamic deps."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ matrix.triple }}
          path: binaries/
          retention-days: 90

      - name: Publish to ffmpeg-bins release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ffmpeg-bins \
            --repo "$GITHUB_REPOSITORY" \
            --title "FFmpeg Binaries" \
            --notes "Pre-built static FFmpeg binaries. Updated automatically." \
            --prerelease 2>/dev/null || true
          gh release upload ffmpeg-bins binaries/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
