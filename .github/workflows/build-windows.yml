name: Build Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download FFmpeg binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          gh release download ffmpeg-bins \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "ffmpeg-x86_64-pc-windows-msvc*" \
            --pattern "ffprobe-x86_64-pc-windows-msvc*" \
            --dir src-tauri/binaries/
          test -f src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe || { echo "ERROR: ffmpeg binary missing from ffmpeg-bins release"; exit 1; }
          test -f src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe || { echo "ERROR: ffprobe binary missing from ffmpeg-bins release"; exit 1; }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node dependencies
        run: npm ci

      - name: Build app
        run: npm run tauri:build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-windows
          retention-days: 30
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
